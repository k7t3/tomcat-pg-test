name: Build and Release Fat WAR

on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Fat WAR
        run: ./gradlew :app:war

      - name: Verify Fat WAR includes dependencies
        run: jar tf app/build/libs/app-fat.war | grep "WEB-INF/lib/.*\.jar$"

      - name: Upload Fat WAR to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/libs/app-fat.war
          fail_on_unmatched_files: true
          name: ${{ github.event.release.name || github.ref_name }}
