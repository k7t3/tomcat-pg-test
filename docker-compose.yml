services:
  db:
    image: postgres:18
    container_name: tomcat-pg-test-db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: appsecret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: docker/tomcat/Dockerfile
    container_name: tomcat-pg-test-app
    environment:
      DB_URL: jdbc:postgresql://db:5432/appdb
      DB_USER: appuser
      DB_PASSWORD: appsecret
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres-data:
